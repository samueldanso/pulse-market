[profile.default]
src            = "src"
out            = "out"
libs           = ["lib"]
solc_version   = "0.8.25"
optimizer      = true
optimizer_runs = 200
remappings     = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
fuji = "https://api.avax-test.network/ext/bc/C/rpc"

[etherscan]
fuji = { key = "verifyContract", url = "https://api.routescan.io/v2/network/testnet/evm/43113/etherscan/api" }
